plugins {
    id 'com.android.application' version '8.9.1' apply false
    id 'org.jetbrains.kotlin.android' version '2.0.21' apply false
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply from: 'variables.gradle'

task clean(type: Delete) {
    delete rootProject.buildDir
}
